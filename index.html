<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 랜선 반려견 프로젝트: 내 친구 멍멍이</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700&display=swap');

:root {
  --pastel-pink: #FFB5C8;
  --pastel-yellow: #FFF3B0;
  --pastel-blue: #B5D8FF;
  --pastel-green: #B5F0C8;
  --pastel-purple: #D8B5FF;
  --pastel-orange: #FFD9B5;
  --warm-white: #FFF9F0;
  --soft-brown: #8B6E4E;
  --text-dark: #3D2B1F;
  --text-mid: #6B5B4E;
  --shadow: rgba(139,110,78,0.15);
  --card-bg: rgba(255,255,255,0.85);
  --phase-bg: #FFF9F0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nanum Gothic', sans-serif;
  background: var(--warm-white);
  color: var(--text-dark);
  min-height: 100vh;
  overflow-x: hidden;
}

h1, h2, h3, .game-title, .btn-main, .stat-label {
  font-family: 'Jua', sans-serif;
}

/* ===== SCREENS ===== */
.screen { display: none; width: 100%; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ===== TITLE SCREEN ===== */
#screen-title {
  background: linear-gradient(135deg, #FFE4EC 0%, #FFF0BB 50%, #E4F5FF 100%);
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 20px;
}

.title-paw {
  font-size: 80px;
  animation: bounce 1.5s infinite;
  display: block;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

.game-title {
  font-size: clamp(28px, 5vw, 48px);
  color: var(--soft-brown);
  margin: 16px 0 8px;
  text-shadow: 2px 2px 0px var(--pastel-pink);
}

.game-subtitle {
  font-size: 18px;
  color: var(--text-mid);
  margin-bottom: 30px;
}

.name-input-box {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 28px 36px;
  box-shadow: 0 8px 30px var(--shadow);
  max-width: 400px;
  width: 100%;
  margin: 0 auto;
}

.name-input-box label {
  display: block;
  font-size: 16px;
  color: var(--text-mid);
  margin-bottom: 10px;
  font-family: 'Jua', sans-serif;
}

.name-input-box input {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid var(--pastel-pink);
  border-radius: 12px;
  font-size: 18px;
  font-family: 'Jua', sans-serif;
  background: #FFF;
  color: var(--text-dark);
  outline: none;
  transition: border-color 0.2s;
}

.name-input-box input:focus { border-color: #FF8FAB; }

.btn-main {
  display: inline-block;
  margin-top: 16px;
  padding: 14px 36px;
  background: linear-gradient(135deg, var(--pastel-pink), #FF8FAB);
  color: #fff;
  border: none;
  border-radius: 50px;
  font-size: 18px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 15px rgba(255,143,171,0.4);
  width: 100%;
}

.btn-main:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255,143,171,0.5); }
.btn-main:active { transform: translateY(0); }

/* ===== QUIZ SCREEN ===== */
#screen-quiz {
  background: linear-gradient(135deg, #E8F4FF 0%, #FFF0F5 100%);
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.quiz-card {
  background: var(--card-bg);
  border-radius: 24px;
  padding: 36px;
  max-width: 520px;
  width: 100%;
  box-shadow: 0 10px 40px var(--shadow);
  text-align: center;
}

.quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.quiz-badge {
  background: var(--pastel-yellow);
  color: var(--soft-brown);
  padding: 6px 16px;
  border-radius: 50px;
  font-family: 'Jua', sans-serif;
  font-size: 14px;
}

.quiz-progress-bar {
  background: #EEE;
  border-radius: 10px;
  height: 8px;
  overflow: hidden;
  flex: 1;
  margin-left: 12px;
}

.quiz-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pastel-pink), #FF8FAB);
  border-radius: 10px;
  transition: width 0.4s ease;
}

.quiz-icon { font-size: 50px; margin-bottom: 12px; }

.quiz-question {
  font-family: 'Jua', sans-serif;
  font-size: 20px;
  color: var(--text-dark);
  margin-bottom: 24px;
  line-height: 1.5;
}

.quiz-options { display: flex; flex-direction: column; gap: 10px; }

.quiz-opt {
  padding: 14px 20px;
  border: 2px solid #E8E0F0;
  border-radius: 14px;
  background: #FFF;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  color: var(--text-dark);
  font-family: 'Nanum Gothic', sans-serif;
}

.quiz-opt:hover { border-color: var(--pastel-pink); background: #FFF5F8; transform: translateX(4px); }
.quiz-opt.correct { border-color: #4CAF50; background: #E8F5E9; }
.quiz-opt.wrong { border-color: #F44336; background: #FFEBEE; }

.quiz-feedback {
  margin-top: 16px;
  padding: 14px 18px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.6;
  display: none;
  text-align: left;
}

.quiz-feedback.show { display: block; }
.quiz-feedback.correct { background: #E8F5E9; color: #2E7D32; border-left: 4px solid #4CAF50; }
.quiz-feedback.wrong { background: #FFEBEE; color: #C62828; border-left: 4px solid #F44336; }

.quiz-next-btn {
  margin-top: 16px;
  padding: 12px 32px;
  background: var(--pastel-blue);
  color: var(--text-dark);
  border: none;
  border-radius: 50px;
  font-family: 'Jua', sans-serif;
  font-size: 16px;
  cursor: pointer;
  display: none;
  transition: transform 0.15s;
}

.quiz-next-btn.show { display: inline-block; }
.quiz-next-btn:hover { transform: scale(1.05); }

/* ===== PERSUADE SCREEN ===== */
#screen-persuade {
  background: linear-gradient(135deg, #FFF5E0 0%, #FFE4EC 100%);
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.persuade-card {
  background: var(--card-bg);
  border-radius: 24px;
  padding: 36px;
  max-width: 520px;
  width: 100%;
  box-shadow: 0 10px 40px var(--shadow);
  text-align: center;
}

.persuade-header {
  font-family: 'Jua', sans-serif;
  font-size: 13px;
  color: var(--text-mid);
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.responsibility-bar-wrap {
  background: #EEE;
  border-radius: 10px;
  height: 10px;
  margin: 10px 0 20px;
  overflow: hidden;
}

.responsibility-bar {
  height: 100%;
  background: linear-gradient(90deg, #FFB5C8, #FF6B9D);
  border-radius: 10px;
  transition: width 0.5s ease;
}

.persuade-npc {
  font-size: 60px;
  margin: 10px 0;
  animation: wobble 3s infinite;
}

@keyframes wobble {
  0%, 100% { transform: rotate(-3deg); }
  50% { transform: rotate(3deg); }
}

.persuade-speech-bubble {
  background: #F0F8FF;
  border-radius: 16px;
  padding: 16px 20px;
  margin: 14px 0;
  font-size: 15px;
  line-height: 1.6;
  position: relative;
  border: 2px solid var(--pastel-blue);
  color: var(--text-dark);
}

.persuade-options { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }

.persuade-opt {
  padding: 13px 18px;
  border: 2px solid #E8E0F0;
  border-radius: 14px;
  background: #FFF;
  font-size: 14px;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  color: var(--text-dark);
}

.persuade-opt:hover { border-color: var(--pastel-orange); background: #FFF8F0; transform: translateX(4px); }
.persuade-opt.selected-correct { border-color: #4CAF50; background: #E8F5E9; }
.persuade-opt.selected-wrong { border-color: #F44336; background: #FFEBEE; }

.persuade-result {
  margin-top: 14px;
  padding: 14px;
  border-radius: 14px;
  font-size: 14px;
  display: none;
  line-height: 1.6;
}

.persuade-result.show { display: block; }
.persuade-result.correct { background: #E8F5E9; color: #2E7D32; }
.persuade-result.wrong { background: #FFEBEE; color: #C62828; }

/* ===== SHOP SCREEN ===== */
#screen-shop {
  background: linear-gradient(135deg, #E8FFE8 0%, #FFF0B5 100%);
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.shop-card {
  background: var(--card-bg);
  border-radius: 24px;
  padding: 30px;
  max-width: 600px;
  width: 100%;
  box-shadow: 0 10px 40px var(--shadow);
}

.shop-title {
  font-family: 'Jua', sans-serif;
  font-size: 24px;
  text-align: center;
  color: var(--soft-brown);
  margin-bottom: 6px;
}

.shop-budget {
  text-align: center;
  font-family: 'Jua', sans-serif;
  font-size: 18px;
  color: #E65100;
  margin-bottom: 20px;
}

.shop-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 14px;
  margin-bottom: 20px;
}

.shop-item {
  border: 2px solid #E8E0F0;
  border-radius: 16px;
  padding: 14px 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: #FFF;
  position: relative;
}

.shop-item:hover { border-color: #FF8FAB; transform: translateY(-3px); box-shadow: 0 6px 20px rgba(255,143,171,0.3); }
.shop-item.purchased { border-color: #4CAF50; background: #E8F5E9; }
.shop-item.cant-afford { opacity: 0.5; cursor: not-allowed; }

.shop-item-emoji { font-size: 36px; display: block; margin-bottom: 6px; }
.shop-item-name { font-family: 'Jua', sans-serif; font-size: 13px; color: var(--text-dark); display: block; margin-bottom: 4px; }
.shop-item-price { font-size: 13px; color: #E65100; font-weight: bold; }
.shop-item-essential { position: absolute; top: 6px; right: 6px; background: var(--pastel-pink); color: #C62828; font-size: 10px; padding: 2px 6px; border-radius: 50px; font-weight: bold; }

.shop-required-notice {
  background: var(--pastel-yellow);
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--soft-brown);
  margin-bottom: 16px;
  text-align: center;
}

.shop-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #B5F0C8, #4CAF50);
  color: #FFF;
  border: none;
  border-radius: 50px;
  font-family: 'Jua', sans-serif;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s;
}

.shop-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(76,175,80,0.4); }
.shop-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

/* ===== MAIN GAME SCREEN ===== */
#screen-game {
  flex-direction: row;
  height: 100vh;
  max-height: 100vh;
  overflow: hidden;
  background: var(--phase-bg);
}

.game-left {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* Status Bar */
.status-bar {
  background: var(--card-bg);
  backdrop-filter: blur(10px);
  border-bottom: 2px solid rgba(255,181,200,0.3);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  flex-shrink: 0;
  z-index: 10;
}

.stat-name {
  font-family: 'Jua', sans-serif;
  font-size: 16px;
  color: var(--soft-brown);
  white-space: nowrap;
}

.stat-day {
  font-family: 'Jua', sans-serif;
  font-size: 13px;
  background: var(--pastel-yellow);
  padding: 4px 12px;
  border-radius: 50px;
  white-space: nowrap;
  color: var(--soft-brown);
}

.stat-group {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,255,255,0.8);
  padding: 5px 10px;
  border-radius: 20px;
  border: 1px solid rgba(255,181,200,0.3);
}

.stat-label { font-size: 12px; color: var(--text-mid); }

.stat-bar {
  width: 60px;
  height: 8px;
  background: #EEE;
  border-radius: 5px;
  overflow: hidden;
}

.stat-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.5s ease;
}

.stat-fill.happiness { background: linear-gradient(90deg, #FFB5C8, #FF6B9D); }
.stat-fill.fullness { background: linear-gradient(90deg, #FFD9B5, #FF8C00); }
.stat-fill.cleanliness { background: linear-gradient(90deg, #B5D8FF, #2196F3); }
.stat-fill.stamina { background: linear-gradient(90deg, #B5F0C8, #4CAF50); }

.stat-num { font-size: 11px; font-weight: bold; color: var(--text-mid); }

/* Dog Scene */
.dog-scene {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px 20px;
  text-align: center;
  transition: background 1s ease;
  overflow: hidden;
  min-height: 0;
}

.dog-stage-badge {
  background: var(--card-bg);
  border-radius: 50px;
  padding: 4px 16px;
  font-family: 'Jua', sans-serif;
  font-size: 13px;
  color: var(--soft-brown);
  margin-bottom: 8px;
  box-shadow: 0 2px 10px var(--shadow);
  border: 1px solid rgba(255,181,200,0.4);
  flex-shrink: 0;
}

.dog-emoji {
  font-size: 80px;
  display: block;
  margin: 4px 0;
  animation: dogFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
  flex-shrink: 0;
}

@keyframes dogFloat {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50% { transform: translateY(-12px) rotate(2deg); }
}

.dog-status-text {
  font-family: 'Jua', sans-serif;
  font-size: 15px;
  color: var(--text-dark);
  margin-top: 6px;
  max-width: 300px;
  line-height: 1.4;
  flex-shrink: 0;
}

/* Action Panel */
.action-panel {
  background: var(--card-bg);
  border-top: 2px solid rgba(255,181,200,0.3);
  padding: 10px 14px;
  flex-shrink: 0;
}

.action-title {
  font-family: 'Jua', sans-serif;
  font-size: 13px;
  color: var(--text-mid);
  margin-bottom: 8px;
  text-align: center;
}

.action-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
}

.action-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 8px 4px;
  border: 2px solid transparent;
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s;
  background: #FFF;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}

.action-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,0.12); }
.action-btn:active { transform: scale(0.95); }

.action-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.action-btn .action-emoji { font-size: 22px; }
.action-btn .action-label { font-family: 'Jua', sans-serif; font-size: 11px; color: var(--text-dark); }

.action-btn.feed { border-color: var(--pastel-orange); }
.action-btn.walk { border-color: var(--pastel-green); }
.action-btn.wash { border-color: var(--pastel-blue); }
.action-btn.play { border-color: var(--pastel-purple); }
.action-btn.sleep { border-color: var(--pastel-pink); }
.action-btn.rest { border-color: #C8E6C9; }

.action-btn.feed:hover { background: #FFF8F0; }
.action-btn.walk:hover { background: #F0FFF4; }
.action-btn.wash:hover { background: #F0F8FF; }
.action-btn.play:hover { background: #F8F0FF; }
.action-btn.sleep:hover { background: #FFF5F8; }
.action-btn.rest:hover { background: #F1F8E9; }

/* Diary Panel */
.diary-panel {
  width: 250px;
  min-width: 200px;
  background: linear-gradient(180deg, #FFF5F8 0%, #F0F8FF 100%);
  border-left: 2px solid rgba(255,181,200,0.3);
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
  flex-shrink: 0;
}

.diary-header {
  padding: 12px 16px;
  background: var(--card-bg);
  border-bottom: 1px solid rgba(255,181,200,0.3);
  font-family: 'Jua', sans-serif;
  font-size: 15px;
  color: var(--soft-brown);
  text-align: center;
  flex-shrink: 0;
}

.diary-entries {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 0;
}

.diary-entries::-webkit-scrollbar { width: 4px; }
.diary-entries::-webkit-scrollbar-thumb { background: var(--pastel-pink); border-radius: 2px; }

.diary-entry {
  background: var(--card-bg);
  border-radius: 10px;
  padding: 8px 10px;
  font-size: 11px;
  line-height: 1.4;
  color: var(--text-mid);
  border-left: 3px solid var(--pastel-pink);
  animation: slideIn 0.3s ease;
  box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  flex-shrink: 0;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(10px); }
  to { opacity: 1; transform: translateX(0); }
}

.diary-entry .entry-time { font-family: 'Jua', sans-serif; font-size: 11px; color: var(--pastel-pink); display: block; margin-bottom: 3px; }
.diary-entry.event { border-left-color: var(--pastel-purple); }
.diary-entry.warning { border-left-color: #F44336; }
.diary-entry.milestone { border-left-color: var(--pastel-green); }

/* ===== EVENT POPUP ===== */
.event-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  backdrop-filter: blur(3px);
}

.event-overlay.show { display: flex; animation: fadeIn 0.3s ease; }

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.event-popup {
  background: var(--card-bg);
  border-radius: 24px;
  padding: 32px;
  max-width: 440px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  text-align: center;
  animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes popIn {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.event-emoji { font-size: 60px; margin-bottom: 12px; display: block; }
.event-title { font-family: 'Jua', sans-serif; font-size: 20px; color: var(--text-dark); margin-bottom: 10px; }
.event-desc { font-size: 14px; color: var(--text-mid); line-height: 1.6; margin-bottom: 20px; }

.event-choices { display: flex; flex-direction: column; gap: 10px; }

.event-choice {
  padding: 13px 20px;
  border: 2px solid #E8E0F0;
  border-radius: 14px;
  background: #FFF;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  color: var(--text-dark);
}

.event-choice:hover { border-color: var(--pastel-purple); background: #F8F0FF; transform: translateX(4px); }

/* ===== WARNING POPUP ===== */
.warning-popup {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #FF6B6B, #FF8E8E);
  color: white;
  padding: 12px 24px;
  border-radius: 50px;
  font-family: 'Jua', sans-serif;
  font-size: 15px;
  z-index: 200;
  box-shadow: 0 8px 25px rgba(255,107,107,0.4);
  animation: slideDown 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
  white-space: nowrap;
}

@keyframes slideDown {
  from { transform: translateX(-50%) translateY(-30px); opacity: 0; }
  to { transform: translateX(-50%) translateY(0); opacity: 1; }
}

@keyframes fadeOut {
  to { opacity: 0; transform: translateX(-50%) translateY(-10px); }
}

/* ===== STAT CHANGE POPUP ===== */
.stat-change-popup {
  position: fixed;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--card-bg);
  padding: 10px 20px;
  border-radius: 50px;
  font-family: 'Jua', sans-serif;
  font-size: 14px;
  color: var(--text-dark);
  z-index: 150;
  box-shadow: 0 8px 25px var(--shadow);
  animation: floatUp 2s ease forwards;
  pointer-events: none;
}

@keyframes floatUp {
  0% { opacity: 0; transform: translateX(-50%) translateY(0); }
  20% { opacity: 1; }
  80% { opacity: 1; transform: translateX(-50%) translateY(-30px); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-50px); }

#screen-ending {
  background: linear-gradient(135deg, #FFE4EC 0%, #E8F0FF 50%, #FFF0B5 100%);

}

.ending-card {

}

.ending-emoji { font-size: 80px; display: block; margin-bottom: 16px; animation: spin 4s infinite linear; }

@keyframes spin {
  0%, 25%, 100% { transform: rotate(0deg); }
  15% { transform: rotate(-10deg); }
  20% { transform: rotate(10deg); }
}

.ending-title { font-family: 'Jua', sans-serif; font-size: 28px; color: var(--soft-brown); margin-bottom: 8px; }

.ending-stats {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin: 20px 0;
  flex-wrap: wrap;
}

.ending-stat {
  background: #F8F8F8;
  border-radius: 14px;
  padding: 12px 16px;

}

.ending-stat-emoji { font-size: 24px; display: block; }

.ending-stat-val { font-family: 'Jua', sans-serif; font-size: 16px; color: var(--text-dark); }

.restart-btn {
  padding: 14px 40px;
  background: linear-gradient(135deg, var(--pastel-pink), #FF8FAB);
  color: #FFF;
  border: none;
  border-radius: 50px;

  font-size: 18px;

}

.restart-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(255,143,171,0.5); }

/* ===== PHASE TRANSITION ===== */
.phase-transition {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #FFF;
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
}

.phase-transition.show { display: flex; animation: phaseFade 2s ease forwards; }

@keyframes phaseFade {
  0% { opacity: 0; }
  20% { opacity: 1; }
  80% { opacity: 1; }
  100% { opacity: 0; pointer-events: none; }
}

.phase-transition-emoji { font-size: 80px; animation: grow 1s ease; }

@keyframes grow {
  from { transform: scale(0); }
  to { transform: scale(1); }
}

.phase-transition-text {

  font-size: 28px;

}
</style>

// 이벤트 순차 재생 (비중복)
let walkEventQueue = [];
let homeEventQueue = [];

function resetEventQueues() {
  walkEventQueue = ALL_EVENTS.filter(e => e.type === 'walk').map((_, i) => i);
  homeEventQueue = ALL_EVENTS.filter(e => e.type === 'home').map((_, i) => i);
  shuffleArray(walkEventQueue);
  shuffleArray(homeEventQueue);
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

const WALK_EVENTS_LIST = ALL_EVENTS.filter(e => e.type === 'walk');
const HOME_EVENTS_LIST = ALL_EVENTS.filter(e => e.type === 'home');

function getNextWalkEvent() {
  if (walkEventQueue.length === 0) {
    walkEventQueue = WALK_EVENTS_LIST.map((_, i) => i);
    shuffleArray(walkEventQueue);
  }
  return WALK_EVENTS_LIST[walkEventQueue.pop()];
}

function getNextHomeEvent() {
  if (homeEventQueue.length === 0) {
    homeEventQueue = HOME_EVENTS_LIST.map((_, i) => i);
    shuffleArray(homeEventQueue);
  }
  return HOME_EVENTS_LIST[homeEventQueue.pop()];
}

// ============================================================
//  SOUND EFFECTS (Web Audio API)
// ============================================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playSound(type) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === 'feed') {
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(); osc.stop(ctx.currentTime + 0.4);
    } else if (type === 'walk') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(330, ctx.currentTime);
      osc.frequency.setValueAtTime(440, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(); osc.stop(ctx.currentTime + 0.3);
    } else if (type === 'wash') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(); osc.stop(ctx.currentTime + 0.4);
    } else if (type === 'play') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(659, ctx.currentTime);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(1047, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(); osc.stop(ctx.currentTime + 0.4);
    } else if (type === 'sleep') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(392, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(261, ctx.currentTime + 0.5);
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
      osc.start(); osc.stop(ctx.currentTime + 0.6);
    } else if (type === 'correct') {
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.15);
      osc.frequency.setValueAtTime(1047, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.start(); osc.stop(ctx.currentTime + 0.5);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(220, ctx.currentTime);
      osc.frequency.setValueAtTime(196, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(); osc.stop(ctx.currentTime + 0.4);
    } else if (type === 'levelup') {
      [523, 659, 784, 1047].forEach((f, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = f;
        g.gain.setValueAtTime(0.12, ctx.currentTime + i*0.12);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.12 + 0.2);
        o.start(ctx.currentTime + i*0.12);
        o.stop(ctx.currentTime + i*0.12 + 0.2);
      });
    }
  } catch(e) {}
}

    feedback.className = 'quiz-feedback wrong show';

}

function buyItem(item) {
  const div = document.getElementById('shop-' + item.id);

  if (purchasedItems.has(item.id)) {
    budget += item.price;
    purchasedItems.delete(item.id);
    if (item.essentialType) purchasedEssentials.delete(item.essentialType);

    div.classList.remove('purchased');
    updateBudgetDisplay();
    addDiaryEntry(`↩️ ${item.name} 구매를 취소했어요. ${item.price}p 환불!`);

    SHOP_ITEMS.forEach(i => {
      const d = document.getElementById('shop-' + i.id);
      if (!purchasedItems.has(i.id)) {
        if (budget < i.price) d.classList.add('cant-afford');
        else d.classList.remove('cant-afford');
      }
    });
    checkShopReady();
    return;
  }

  if (item.essentialType && [...purchasedItems].some(id => {
    const found = SHOP_ITEMS.find(i => i.id === id);
    return found && found.essentialType === item.essentialType;
  })) {
    showWarning('같은 종류 아이템이 이미 있어요! 기존 것을 먼저 취소해주세요.');
    return;
  }

  if (budget < item.price) {
    showWarning('포인트가 부족해요! 💸');
    div.classList.add('cant-afford');
    return;
  }

  budget -= item.price;
  purchasedItems.add(item.id);
  if (item.essentialType) purchasedEssentials.add(item.essentialType);

  div.classList.add('purchased');
  updateBudgetDisplay();
  addDiaryEntry(`🛒 ${item.name} ${item.price}p에 구매했어요!`);

  SHOP_ITEMS.forEach(i => {
    const d = document.getElementById('shop-' + i.id);
    if (!purchasedItems.has(i.id)) {
      if (budget < i.price) d.classList.add('cant-afford');
      else d.classList.remove('cant-afford');
    }
  });

  checkShopReady();
}

function updateBudgetDisplay() {
  document.getElementById('budget-display').textContent = budget;
}

function checkShopReady() {
  const required = ['house', 'bowl', 'toilet', 'leash'];
  const allReady = required.every(r => purchasedEssentials.has(r));

  const stageName = STAGES[currentStage].name;

function advanceTime() {
  hourIdx++;
  if (hourIdx >= HOURS.length) {
    hourIdx = 0;
    const fullnessDecay = currentStage === 0 ? -20 : -15;
    applyStatChange({ happiness: -5, fullness: fullnessDecay, cleanliness: -3, stamina: 0 });
  }
  document.getElementById('stat-day').textContent = getTimeLabel();
}

function advanceMonth() {
  currentMonth++;
  hourIdx = 0;

  const fullnessDecay = currentStage === 0 ? -20 : -15;
  applyStatChange({ happiness: -5, fullness: fullnessDecay, cleanliness: -5, stamina: 0 });

  if (currentMonth > 7) {
    currentStage++;
    if (currentStage >= STAGES.length) {
      triggerEnding();
      return false; 
    }
    currentMonth = 1;
    showPhaseTransition();
    updateScene();
    addDiaryEntry(`🌟 어느새 시간이 훌쩍 흘렀어요! ${STAGES[currentStage].name}이 됐어요!`, 'milestone');
  } else {
    addDiaryEntry(`📅 ${currentMonth - 1}달이 지났어요. 어느새 ${STAGES[currentStage].name}! 🐾`, 'milestone');
  }
  document.getElementById('stat-day').textContent = getTimeLabel();
  return true;
}

// ============================================================
//  ACTIONS
// ============================================================
function doAction(action) {
  const buttons = document.querySelectorAll('.action-btn');
  buttons.forEach(b => b.disabled = true);
  
  playSound(action === 'rest' ? 'sleep' : action);
  
  let changes = {};
  let text = '';
  let triggerEvent = false;
  
  switch(action) {
    case 'feed':
      changes = { fullness: 30, cleanliness: -10 };
      text = `🍚 밥을 줬어요. ${dogName}가 맛있게 먹었어요! 포만감↑ 청결도↓`;
      break;
    case 'walk':
      if (stats.stamina < 20) {
        showWarning(`${dogName}가 너무 피곤해요! 먼저 재워주세요. 💤`);
        buttons.forEach(b => b.disabled = false);
        return;
      }
      changes = { stamina: -20, happiness: 30, cleanliness: -20, fullness: -5 };
      text = `🦮 산책을 했어요! ${dogName}가 신나게 뛰었어요! 행복↑ 체력↓ 청결↓`;
      triggerEvent = Math.random() < 0.3;
      break;
    case 'wash':
      changes = { cleanliness: 40, stamina: -10, happiness: -8 };
      text = `🧽 씻겼어요! 깨끗해진 ${dogName}! 청결↑ 체력↓ 행복↓ (목욕이 싫어요~)`;
      break;
    case 'play':
      changes = { happiness: 20, stamina: -15, fullness: -10 };
      text = `🎾 신나게 놀아줬어요! ${dogName}가 꼬리를 흔들어요! 행복↑ 체력↓ 포만↓`;
      triggerEvent = Math.random() < 0.3;
      break;
    case 'rest': {
      stats.stamina = Math.min(100, stats.stamina + 30);
      text = `🛋️ ${dogName}가 잠깐 쉬었어요! 3시간이 지나갔어요. 체력 +30`;
      for (let i = 0; i < 3; i++) {
        hourIdx++;
        if (hourIdx >= HOURS.length) hourIdx = HOURS.length - 1;
      }
      updateStatUI();
      addDiaryEntry(text);
      document.getElementById('stat-day').textContent = getTimeLabel();
      updateScene();
      checkWarnings();
      buttons.forEach(b => b.disabled = false);
      return;
    }
    case 'sleep': {
      stats.stamina = 100;
      stats.fullness = Math.max(0, stats.fullness - 10);
      text = `💤 ${dogName}가 푹 잤어요! 한 달이 훌쩍 지났어요. 체력 완전 회복!`;
      addDiaryEntry(text);
      const cont = advanceMonth();
      updateGameUI();
      updateScene();
      if (cont) checkWarnings();
      buttons.forEach(b => b.disabled = false);
      return;
    }
  }
  
  if (triggerEvent && action === 'walk') {
    const ev = getNextWalkEvent();
    applyStatChange(changes);
    addDiaryEntry(text);
    advanceTime();
    updateGameUI();
    updateScene();
    showStatChange(buildStatText(changes));
    setTimeout(() => showEvent(ev), 300);
    actionCount++;
    totalHappiness += stats.happiness;
    totalCleanliness += stats.cleanliness;
    totalFullness += stats.fullness;   // 추가
    totalStamina += stats.stamina;     // 추가
    buttons.forEach(b => b.disabled = false);
    return;
  }
  
  if (triggerEvent && action === 'play') {
    const ev = getNextHomeEvent();
    applyStatChange(changes);
    addDiaryEntry(text);
    advanceTime();
    updateGameUI();
    updateScene();
    showStatChange(buildStatText(changes));
    setTimeout(() => showEvent(ev), 300);
    actionCount++;
    totalHappiness += stats.happiness;
    totalCleanliness += stats.cleanliness;
    totalFullness += stats.fullness;   // 추가
    totalStamina += stats.stamina;     // 추가
    buttons.forEach(b => b.disabled = false);
    return;
  }
  
  applyStatChange(changes);
  addDiaryEntry(text);
  advanceTime();
  updateGameUI();
  updateScene();
  checkWarnings();
  showStatChange(buildStatText(changes));
  
  actionCount++;
  totalHappiness += stats.happiness;
  totalCleanliness += stats.cleanliness;
  totalFullness += stats.fullness;   // 추가
  totalStamina += stats.stamina;     // 추가
  
  buttons.forEach(b => b.disabled = false);
}

function buildStatText(changes) {
  const icons = {happiness:'💖', fullness:'🍗', cleanliness:'🫧', stamina:'⚡'};
  return Object.entries(changes).map(([k, v]) => `${icons[k]} ${v > 0 ? '+' : ''}${v}`).join(' ');
}

// ============================================================
//  STAT MANAGEMENT
// ============================================================
function applyStatChange(changes) {
  Object.entries(changes).forEach(([key, val]) => {
    stats[key] = Math.max(0, Math.min(100, stats[key] + val));
    // [추가] 스탯이 0으로 방치된 적이 있으면 히스토리에 기록
    if (stats[key] <= 0) {
      warningHistory[key] = true;
    }
  });
  updateStatUI();
}

function updateStatUI() {
  ['happiness', 'fullness', 'cleanliness', 'stamina'].forEach(s => {
    document.getElementById('bar-' + s).style.width = stats[s] + '%';
    document.getElementById('num-' + s).textContent = Math.round(stats[s]);
  });
}

function checkWarnings() {
  const warn = [];
  if (stats.happiness < 20) warn.push(`💖 ${dogName}가 너무 슬퍼해요!`);
  if (stats.fullness < 15) warn.push(`🍗 ${dogName}가 너무 배고파요!`);
  if (stats.cleanliness < 15) warn.push(`🫧 ${dogName}가 너무 더러워요!`);
  if (stats.stamina < 10) warn.push(`⚡ ${dogName}가 너무 지쳐있어요!`);
  
  if (warn.length) {
    warn.forEach(w => {
      showWarning(w);
      addDiaryEntry('⚠️ ' + w, 'warning');
    });
    applyStatChange({ happiness: -5 });
  }
}

// ============================================================
//  SCENE UPDATE
// ============================================================
const STAGE_SCENES = [
  { sad: '😿', tired: '😴', dirty: '🙈', happy: '🐶', normal: '🐶', energetic: '🐕' },
  { sad: '😞', tired: '💤', dirty: '🙊', happy: '🐕', normal: '🐕', energetic: '🏃' },
  { sad: '😔', tired: '😪', dirty: '🤢', happy: '🦮', normal: '🦮', energetic: '🦮' },
  { sad: '😔', tired: '🛌', dirty: '😓', happy: '🐕‍🦺', normal: '🐕‍🦺', energetic: '🌸' },
];

function updateScene() {
  const s = STAGES[currentStage];
  const scene = document.getElementById('dog-scene');
  scene.style.background = s.bg;
  
  document.getElementById('stage-badge').textContent = s.name;
  
  const sc = STAGE_SCENES[currentStage];
  let emoji, text;
  
  const avgStat = (stats.happiness + stats.fullness + stats.cleanliness + stats.stamina) / 4;
  
  if (stats.stamina < 20) {
    emoji = sc.tired;
    text = `${dogName}가 너무 피곤해서 쉬고 싶어해요... 💤`;
  } else if (stats.cleanliness < 20) {
    emoji = sc.dirty;
    text = `${dogName}가 냄새가 나요... 씻겨줘야 해요! 🛁`;
  } else if (stats.happiness < 25) {
    emoji = sc.sad;
    text = `${dogName}가 슬퍼보여요... 같이 놀아줘요 🥺`;
  } else if (stats.fullness < 20) {
    emoji = '🍽️';
    text = `${dogName}가 배가 너무 고파요! 밥 주세요~ 🍚`;
  } else if (avgStat > 75) {
    emoji = sc.energetic;
    text = `${dogName}가 너무 행복해요! 꼬리가 세차게 흔들려요 💕`;
  } else {
    emoji = s.emoji;
    text = `${dogName}가 평화롭게 지내고 있어요 🐾`;
  }
  
  document.getElementById('dog-emoji').textContent = emoji;
  document.getElementById('dog-status-text').textContent = text;
}

function updateGameUI() {
  updateStatUI();
  document.getElementById('stat-day').textContent = getTimeLabel();
  document.getElementById('stat-dog-name').textContent = dogName;
}

// ============================================================
//  EVENTS
// ============================================================
function showEvent(event) {
  document.getElementById('event-emoji').textContent = event.emoji;
  document.getElementById('event-title').textContent = event.title;
  document.getElementById('event-desc').textContent = event.desc;
  
  const choicesDiv = document.getElementById('event-choices');
  choicesDiv.innerHTML = '';
  
  event.choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'event-choice';
    btn.textContent = choice.text;
    btn.onclick = () => resolveEvent(choice);
    choicesDiv.appendChild(btn);
  });
  
  document.getElementById('event-overlay').classList.add('show');
}

function resolveEvent(choice) {
  document.getElementById('event-overlay').classList.remove('show');
  applyStatChange(choice.statChange);
  eventScore += choice.score;
  const type = choice.good ? 'milestone' : 'warning';
  addDiaryEntry(`⚡ 이벤트: ${choice.effect}`, type);
  if (choice.tip) {
    addDiaryEntry(choice.tip, 'milestone');
    setTimeout(() => showTipPopup(choice.tip), 400);
  } else {
    showStatChange(choice.effect);
  }
  updateScene();
  checkWarnings();
}

// ============================================================
//  DIARY
// ============================================================
function addDiaryEntry(text, type = '') {
  const entries = document.getElementById('diary-entries');
  const entry = document.createElement('div');
  entry.className = 'diary-entry' + (type ? ' ' + type : '');
  
  const timeSpan = document.createElement('span');
  timeSpan.className = 'entry-time';
  timeSpan.textContent = getTimeLabel();
  entry.appendChild(timeSpan);
  entry.appendChild(document.createTextNode(text));
  entries.appendChild(entry);
  
  entries.scrollTop = entries.scrollHeight;
}

// ============================================================
//  PHASE TRANSITION
// ============================================================
function showPhaseTransition() {
  const s = STAGES[currentStage];
  const pt = document.getElementById('phase-transition');
  document.getElementById('pt-emoji').textContent = s.emoji;
  document.getElementById('pt-text').textContent = `시간이 훌쩍 흘러... ${dogName}가 ${s.age}이 됐어요!`;
  
  pt.classList.add('show');
  playSound('levelup');
  
  addDiaryEntry(`🌟 성장! ${s.name} 단계가 됐어요!`, 'milestone');
  
  setTimeout(() => {
    pt.classList.remove('show');
  }, 2000);
}

// ============================================================
//  WARNINGS & FEEDBACK
// ============================================================
function showWarning(text) {
  const existing = document.querySelector('.warning-popup');
  if (existing) existing.remove();
  
  const popup = document.createElement('div');
  popup.className = 'warning-popup';
  popup.textContent = text;
  document.body.appendChild(popup);
  
  setTimeout(() => popup.remove(), 3100);
}

function showStatChange(text) {
  const existing = document.querySelector('.stat-change-popup');
  if (existing) existing.remove();
  
  const popup = document.createElement('div');
  popup.className = 'stat-change-popup';
  popup.textContent = text;
  document.body.appendChild(popup);
  
  setTimeout(() => popup.remove(), 2200);
}

function showTipPopup(tipText) {
  document.getElementById('event-emoji').textContent = '💡';
  document.getElementById('event-title').textContent = '알고 계셨나요?';
  document.getElementById('event-desc').textContent = tipText;
  const choicesDiv = document.getElementById('event-choices');
  choicesDiv.innerHTML = '';
  const btn = document.createElement('button');
  btn.className = 'event-choice';
  btn.textContent = '✅ 알겠어요!';
  btn.onclick = () => document.getElementById('event-overlay').classList.remove('show');
  choicesDiv.appendChild(btn);
  document.getElementById('event-overlay').classList.add('show');
}

// ============================================================
//  ENDING (AND 조건 및 방치 이력 개편)
// ============================================================
function triggerEnding() {
  const avgHappiness  = actionCount > 0 ? totalHappiness  / actionCount : 30;
  const avgFullness   = actionCount > 0 ? totalFullness   / actionCount : 30;
  const avgCleanliness = actionCount > 0 ? totalCleanliness / actionCount : 30;
  const avgStamina    = actionCount > 0 ? totalStamina    / actionCount : 30;

  // 전체 평균 계산 (F등급 산정 등에 활용)
  const overallAvg = (avgHappiness + avgFullness + avgCleanliness + avgStamina) / 4;

  let ending = {};

  // 1. 방치 히스토리 확인 (게임 중 한 번이라도 스탯이 0 이하로 떨어진 적이 있는지)
  const isNeglected = warningHistory.happiness || warningHistory.fullness || 
                      warningHistory.cleanliness || warningHistory.stamina;

  // 2. 과락 기준(50점 미만) 스탯 확인
  let weakPoints = [];
  if (avgHappiness < 50) weakPoints.push("행복");
  if (avgFullness < 50) weakPoints.push("밥(포만감)");
  if (avgCleanliness < 50) weakPoints.push("청결");
  if (avgStamina < 50) weakPoints.push("체력");

  // === [S등급] 모든 스탯이 80 이상이고(AND), 한 번도 방치한 적 없음 ===
  if (avgHappiness >= 80 && avgFullness >= 80 && avgCleanliness >= 80 && avgStamina >= 80 && !isNeglected) {
    ending = {
      emoji: '🏆',
      grade: 'S',
      title: '환상의 짝꿍! (최고의 반려인)',
      color: '#FF6B9D',
      desc: `모든 것을 완벽하게 돌봐주셨군요! ${dogName}가 견생 최고의 행복을 누렸습니다. 꼼수 없이 모든 것을 골고루 돌봐준 당신, 반려견과 평생을 함께할 완벽한 자격이 있어요! 🌟`
    };
  } 
  // === [A등급] 모든 스탯 70 이상 (방치 이력에 따라 분기) ===
  else if (avgHappiness >= 70 && avgFullness >= 70 && avgCleanliness >= 70 && avgStamina >= 70) {
    if (isNeglected) {
      // 평균 점수는 높으나 방치 이력이 있는 경우 페널티
      ending = {
        emoji: '😅',
        grade: 'A',
        title: '아차상 (초심 잃은 반려인)',
        color: '#FFA726',
        desc: `최종 상태는 좋지만 중간에 ${dogName}가 너무 힘들어서 쓰러질 뻔한 적(스탯 0 방치)이 있네요. 생명을 돌보는 일은 한순간도 방심해선 안 된답니다! 조금 더 분발해 봐요.`
      };
    } else {
      ending = {
        emoji: '⭐',
        grade: 'A',
        title: '훌륭한 반려인!',
        color: '#4CAF50',
        desc: `${dogName}를 안정적으로 잘 돌봐주셨습니다. 부족함 없이 모든 면에서 건강하게 자랐어요! 훌륭합니다. 🐾`
      };
    }
  } 
  // === [B등급] 과락 스탯(50점 미만)이 하나도 없는 경우 ===
  else if (weakPoints.length === 0) {
    ending = {
      emoji: '🏠',
      grade: 'B',
      title: '노력하는 초보 반려인',
      color: '#2196F3',
      desc: `서툴렀지만 끝까지 책임지고 돌봐주었어요. 모든 상태를 50점 이상 골고루 신경 쓰느라 고생 많았습니다! 조금 더 세심하게 챙겨주면 완벽할 거예요. 💕`
    };
  } 
  // === [C등급] 과락 스탯이 존재하는 경우 ===
  else if (overallAvg >= 40) {
    ending = {
      emoji: '🌧️',
      grade: 'C',
      title: '준비가 더 필요한 반려인',
      color: '#757575',
      desc: `${dogName}가 많이 힘들어했어요. 다른 걸 아무리 잘했어도 특히 <b>[${weakPoints.join(", ")}]</b> 관리가 부족했습니다. 모든 부분을 골고루 챙길 줄 알아야 진짜 준비된 반려인이에요! 💪`
    };
  } 
  // === [F등급] 전반적인 돌봄 포기 상태 ===
  else {
    ending = {
      emoji: '💔',
      grade: 'F',
      title: '불쌍한 강아지 😭',
      color: '#FF6B6B',
      desc: `${dogName}는 제대로 된 돌봄을 받지 못해 정말 힘든 견생을 보냈어요. 반려동물 돌봄은 단순히 예뻐하는 게 아니라 생명을 책임지는 무거운 일이랍니다. 반드시 충분히 공부하고 준비해야 해요.`
    };
  }

  document.getElementById('ending-emoji').textContent = ending.emoji;
  document.getElementById('ending-title').textContent = ending.title;
  document.getElementById('ending-dog-name').innerHTML =
    `<span style="color:${ending.color}">${dogName}</span>의 견생 이야기`;
  document.getElementById('ending-desc').innerHTML = ending.desc; // HTML 태그(b태그) 허용을 위해 innerHTML 사용

  const statsDiv = document.getElementById('ending-stats');
  // 엔딩 화면에서도 모든 4가지 스탯 결과를 보여주도록 수정
  statsDiv.innerHTML = `
    <div class="ending-stat">
      <span class="ending-stat-emoji">💖</span>
      <span class="ending-stat-label">행복도</span>
      <span class="ending-stat-val">${Math.round(avgHappiness)}</span>
    </div>
    <div class="ending-stat">
      <span class="ending-stat-emoji">🍗</span>
      <span class="ending-stat-label">포만감</span>
      <span class="ending-stat-val">${Math.round(avgFullness)}</span>
    </div>
    <div class="ending-stat">
      <span class="ending-stat-emoji">🫧</span>
      <span class="ending-stat-label">청결도</span>
      <span class="ending-stat-val">${Math.round(avgCleanliness)}</span>
    </div>
    <div class="ending-stat">
      <span class="ending-stat-emoji">⚡</span>
      <span class="ending-stat-label">체력</span>
      <span class="ending-stat-val">${Math.round(avgStamina)}</span>
    </div>
    <div class="ending-stat" style="background:linear-gradient(135deg,#FFF0F5,#F0F8FF); width: 100%; margin-top: 10px;">
      <span class="ending-stat-emoji">🏅</span>
      <span class="ending-stat-label">종합 등급</span>
      <span class="ending-stat-val" style="font-size:20px;color:${ending.color}">${ending.grade}</span>
    </div>
  `;

  showScreen('ending');
  playSound('levelup');
}

// ============================================================
//  RESTART
// ============================================================
function restartGame() {
  dogName = '멍멍이';
  quizIdx = 0;
  persuadeIdx = 0;
  responsibility = 0;
  budget = 100;
  purchasedItems.clear();
  purchasedEssentials.clear();
  currentMonth = 1;
  currentStage = 0;
  hourIdx = 0;

  document.getElementById('diary-entries').innerHTML = '';
  document.getElementById('dog-name-input').value = '';

  showScreen('title');
}
